services:
  - type: web
    name: wcpredict
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: FOOTBALL_DATA_API_KEY
        sync: false
